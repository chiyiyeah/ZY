<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紙電路實作自動化學習單</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #95a5a6;
        }
        #message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            display: none;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ 紙電路實作學習單</h2>
    <form id="quizForm">
        <div class="form-group">
            <label for="classGroup">班級</label>
            <select id="classGroup" name="classGroup" required>
                <option value="" disabled selected>請選擇班級</option>
                <option value="航一">航一</option>
                <option value="航二">航二</option>
                <option value="航三">航三</option>
            </select>
        </div>

        <div class="form-group">
            <label for="studentName">學生姓名與座號</label>
            <input type="text" id="studentName" name="studentName" placeholder="例如：王小明 01號" required>
        </div>

        <div class="form-group">
            <label for="ledColor">LED 顏色</label>
            <select id="ledColor" name="ledColor" required>
                <option value="" disabled selected>請選擇顏色</option>
                <option value="紅光">紅光</option>
                <option value="綠光">綠光</option>
                <option value="藍光">藍光</option>
                <option value="黃光">黃光</option>
            </select>
        </div>

        <div class="form-group">
            <label>是否成功發光？</label>
            <div class="radio-group">
                <label><input type="radio" name="isSuccess" value="是" required> 是</label>
                <label><input type="radio" name="isSuccess" value="否"> 否</label>
            </div>
        </div>

        <div class="form-group">
            <label for="reflection">困難與反思</label>
            <textarea id="reflection" name="reflection" placeholder="請寫下你在製作過程中遇到的困難或心得..." required></textarea>
        </div>

        <button type="submit" id="submitBtn">🚀 送出學習單</button>
    </form>
    <div id="message"></div>
</div>

<script>
    // 您的專屬 GAS 網頁應用程式網址
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxwFbXpyiibSGwaV6b0kfLX0O1T16lq-LRZMx-6NMiBstonTZ5nc1BJtVOezy35Y7HN/exec';

    document.getElementById('quizForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        
        submitBtn.disabled = true;
        submitBtn.innerText = '傳送中...';
        messageDiv.style.display = 'none';

        // 封裝表單資料
        const formData = new FormData(this);
        const searchParams = new URLSearchParams();
        
        for (const pair of formData) {
            searchParams.append(pair[0], pair[1]);
        }

        // 透過 AJAX 傳送資料到 GAS
        fetch(GAS_URL, {
            method: 'POST',
            body: searchParams,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            }
        })
        .then(response => response.json())
        .then(data => {
            if(data.result === 'success') {
                messageDiv.className = 'success';
                messageDiv.innerText = '🎉 太棒了！你的學習單已成功送出！';
                messageDiv.style.display = 'block';
                document.getElementById('quizForm').reset();
            } else {
                throw new Error(data.error);
            }
        })
        .catch(error => {
            messageDiv.className = 'error';
            messageDiv.innerText = '❌ 傳送失敗，請檢查網路或聯絡老師！';
            messageDiv.style.display = 'block';
            console.error('Error:', error);
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = '🚀 送出學習單';
        });
    });
</script>

</body>
</html>
