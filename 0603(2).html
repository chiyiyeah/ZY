<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 紙電路實作數位學習單</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #6366f1;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 550px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header i {
            font-size: 3rem;
            color: #fbbf24;
            margin-bottom: 10px;
        }

        h2 {
            margin: 0;
            color: #1e293b;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #475569;
        }

        /* 姓名與座號並排樣式 */
        .input-row {
            display: flex;
            gap: 15px;
        }

        .input-row .form-group {
            flex: 1;
        }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .radio-card-group {
            display: flex;
            gap: 20px;
        }

        .radio-option {
            flex: 1;
            position: relative;
        }

        .radio-option input {
            position: absolute;
            opacity: 0;
        }

        .radio-label {
            display: block;
            text-align: center;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .radio-option input:checked + .radio-label {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        #message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
            font-weight: 700;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <i class="fa-solid fa-bolt-lightning"></i>
        <h2>紙電路實作學習單</h2>
        <p style="color: #64748b;">請完成實驗後填寫以下回饋紀錄</p>
    </div>

    <form id="quizForm">
        <div class="form-group">
            <label><i class="fa-solid fa-school"></i> 班級</label>
            <select name="classGroup" required>
                <option value="" disabled selected>請選擇您的班級</option>
                <option value="航一">航一</option>
                <option value="航二">航二</option>
                <option value="航三">航三</option>
            </select>
        </div>

        <div class="input-row">
            <div class="form-group">
                <label><i class="fa-solid fa-list-ol"></i> 座號</label>
                <input type="number" name="seatNo" placeholder="例如：05" min="1" max="50" required>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-user"></i> 姓名</label>
                <input type="text" name="studentName" placeholder="輸入全名" required>
            </div>
        </div>

        <div class="form-group">
            <label><i class="fa-solid fa-lightbulb"></i> LED 顏色</label>
            <select name="ledColor" required>
                <option value="" disabled selected>選擇您使用的 LED 顏色</option>
                <option value="紅光">🔴 紅光</option>
                <option value="綠光">🟢 綠光</option>
                <option value="藍光">🔵 藍光</option>
                <option value="黃光">🟡 黃光</option>
            </select>
        </div>

        <div class="form-group">
            <label><i class="fa-solid fa-circle-question"></i> 是否成功發光？</label>
            <div class="radio-card-group">
                <div class="radio-option">
                    <input type="radio" id="yes" name="isSuccess" value="是" required>
                    <label for="yes" class="radio-label">👍 是，成功</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="no" name="isSuccess" value="否">
                    <label for="no" class="radio-label">🤔 否，有困難</label>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label><i class="fa-solid fa-pen-to-square"></i> 困難與反思</label>
            <textarea name="reflection" placeholder="分享您在製作過程中的發現或遇到的問題..." required></textarea>
        </div>

        <button type="submit" id="submitBtn">
            <i class="fa-solid fa-paper-plane"></i> 🚀 送出學習單
        </button>
    </form>

    <div id="message"></div>
</div>

<script>
    // 已更換為您提供的新網址
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbw--uD_M1NSva2FVjx1B4BftB5tP5_ixG1aeWxkEzG1r3yXoJdvpiTagOrMg-5g5JEIEA/exec';

    document.getElementById('quizForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('message');
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 傳送中...';
        msg.style.display = 'none';

        const formData = new FormData(this);
        const params = new URLSearchParams();
        for (const pair of formData) { params.append(pair[0], pair[1]); }

        fetch(GAS_URL, {
            method: 'POST',
            body: params,
            mode: 'no-cors' // 徹底防範跨網域 CORS 阻擋
        })
        .then(() => {
            msg.className = 'success';
            msg.innerHTML = '🎉 太棒了！學習單已成功送出！';
            msg.style.display = 'block';
            document.getElementById('quizForm').reset();
        })
        .catch(err => {
            msg.className = 'error';
            msg.innerHTML = '❌ 傳送失敗，請確認網路或重新部署。';
            msg.style.display = 'block';
            console.error(err);
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> 🚀 送出學習單';
        });
    });
</script>

</body>
</html>
