```html
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航海避碰教學互動平台</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #eef2f3; touch-action: none; user-select: none; }
        nav { background: #004e70; padding: 15px; display: flex; justify-content: space-around; }
        nav a { color: white; cursor: pointer; font-weight: bold; text-decoration: none; }
        .content { padding: 20px; display: none; }
        .active { display: block; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { padding: 15px 30px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 8px; font-size: 18px; }
        
        #game-area { position: relative; width: 90vw; height: 50vh; background: #4facfe; margin: 0 auto; overflow: hidden; border: 4px solid #fff; touch-action: none; }
        .unit { position: absolute; width: 9vw; height: 5vh; display: flex; justify-content: center; align-items: center; font-size: 25px; transition: all 0.1s linear; }
        #port { position: absolute; width: 9vw; height: 5vh; background: gold; border-radius: 5px; display: flex; justify-content: center; align-items: center; font-size: 25px; z-index: 10; }
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

<nav>
    <a onclick="showTab('rules')">規則</a>
    <a onclick="showTab('lights')">燈號</a>
    <a onclick="showTab('quiz')">測驗</a>
    <a onclick="showTab('game')">遊戲</a>
</nav>

<div id="rules" class="content active">
    <div class="card">
        <h2>避碰規則重點</h2>
        <p>對遇局面應各自右轉，以左舷通過；交叉相遇時，右舷有他船為讓路船；追越時被追越船保持航向。</p>
    </div>
</div>

<div id="lights" class="content">
    <div class="card">
        <h2>船舶燈號識別</h2>
        <p>🔴左舷 | 🟢右舷 | 🔴🔴失控船 | 🟡🟡拖帶船</p>
    </div>
</div>

<div id="quiz" class="content">
    <div class="card">
        <h2>測驗</h2>
        <p id="q-text">對遇局面應向哪邊轉？</p>
        <button class="btn" onclick="check(0)">向右</button>
        <button class="btn" onclick="check(1)">向左</button>
        <p>得分：<span id="score">0</span></p>
    </div>
</div>

<div id="game" class="content">
    <div class="card">
        <h3>生命值: <span id="life">5</span></h3>
        <div id="game-area">
            <div id="overlay">
                <h2 id="msg">開始航行</h2>
                <button class="btn" onclick="startGame()">開始遊戲</button>
            </div>
            <div id="port">⚓</div>
            <div id="ship" class="unit">🚢</div>
            <div id="o1" class="unit">🛢️</div>
            <div id="o2" class="unit">🛳️</div>
            <div id="o3" class="unit">🎣</div>
        </div>
    </div>
</div>

<script>
    let life = 5, score = 0, gameStarted = false;
    let ship = {x:0, y:0}, port = {x:9, y:9};
    const obs = [
        { el: document.getElementById('o1'), x: 5, y: 5, mode: 'chase' },
        { el: document.getElementById('o2'), x: 8, y: 2, mode: 'wander' },
        { el: document.getElementById('o3'), x: 2, y: 8, mode: 'wander' }
    ];

    function showTab(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function check(i) { if(i === 0) { score++; life++; document.getElementById('score').innerText = score; } }

    function updateView() {
        document.getElementById('ship').style.left = (ship.x * 9) + 'vw';
        document.getElementById('ship').style.top = (ship.y * 5) + 'vh';
        document.getElementById('port').style.left = (port.x * 9) + 'vw';
        document.getElementById('port').style.top = (port.y * 5) + 'vh';
        obs.forEach(o => {
            o.el.style.left = (o.x * 9) + 'vw';
            o.el.style.top = (o.y * 5) + 'vh';
        });
    }

    function startGame() {
        gameStarted = true; life = 5;
        ship = {x: 0, y: 0};
        do { port = {x: Math.floor(Math.random()*10), y: Math.floor(Math.random()*10)}; } 
        while (Math.abs(port.x - ship.x) + Math.abs(port.y - ship.y) < 10);
        
        obs.forEach(o => { o.x = Math.floor(Math.random()*10); o.y = Math.floor(Math.random()*10); });
        document.getElementById('life').innerText = life;
        document.getElementById('overlay').style.display = 'none';
        updateView();
    }

    // 鍵盤操控
    window.addEventListener('keydown', e => {
        if(!gameStarted) return;
        if(e.key === 'ArrowLeft') move(-1, 0);
        if(e.key === 'ArrowRight') move(1, 0);
        if(e.key === 'ArrowUp') move(0, -1);
        if(e.key === 'ArrowDown') move(0, 1);
    });

    // 平板觸控滑動
    let sx, sy;
    const ga = document.getElementById('game-area');
    ga.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, {passive: false});
    ga.addEventListener('touchend', e => {
        if(!gameStarted) return;
        let dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
        if(Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 1 : -1, 0);
        else move(0, dy > 0 ? 1 : -1);
    }, {passive: false});

    function move(dx, dy) {
        ship.x = Math.max(0, Math.min(9, ship.x + dx));
        ship.y = Math.max(0, Math.min(9, ship.y + dy));
        checkStatus(); updateView();
    }

    function checkStatus() {
        if(ship.x === port.x && ship.y === port.y) {
            gameStarted = false; document.getElementById('msg').innerText = "獲勝！重玩？"; document.getElementById('overlay').style.display = 'flex';
        }
        obs.forEach(o => {
            if(o.x === ship.x && o.y === ship.y) {
                life--; document.getElementById('life').innerText = life;
                if(life <= 0) { gameStarted = false; document.getElementById('msg').innerText = "失敗！重玩？"; document.getElementById('overlay').style.display = 'flex'; }
            }
        });
    }

    setInterval(() => {
        if(!gameStarted) return;
        obs.forEach(o => {
            if(o.mode === 'chase') { o.x += (o.x < ship.x ? 1 : o.x > ship.x ? -1 : 0); o.y += (o.y < ship.y ? 1 : o.y > ship.y ? -1 : 0); }
            else { o.x = Math.max(0, Math.min(9, o.x + (Math.random() > 0.5 ? 1 : -1))); o.y = Math.max(0, Math.min(9, o.y + (Math.random() > 0.5 ? 1 : -1))); }
        });
        checkStatus(); updateView();
    }, 1200);
</script>
</body>
</html>
