<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國小五英文家教工作台</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            margin: 0; padding: 0; display: flex; height: 100vh;
            background-color: #f8f9fa; color: #333; overflow: hidden;
        }
        /* 左側控制面板 */
        #sidebar {
            width: 280px; background-color: #2c3e50; color: white;
            padding: 20px 15px; display: flex; flex-direction: column; gap: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1); flex-shrink: 0; overflow-y: auto;
        }
        .sidebar-title {
            font-size: 18px; font-weight: bold; text-align: center;
            padding-bottom: 15px; border-bottom: 1px solid #34495e; color: #1abc9c; margin: 0;
        }
        .section-group { display: flex; flex-direction: column; gap: 8px; }
        .section-label { font-size: 12px; color: #95a5a6; font-weight: 600; letter-spacing: 1px; }
        /* 按鈕樣式 */
        .btn {
            background-color: #34495e; color: #ecf0f1; border: none; padding: 12px 15px;
            font-size: 14px; text-align: left; cursor: pointer; border-radius: 6px;
            transition: all 0.2s ease; display: flex; align-items: center; justify-content: space-between; width: 100%;
        }
        .btn:hover { background-color: #415b76; color: white; }
        .btn.active { background-color: #1abc9c; color: white; font-weight: bold; }
        .btn-web { background-color: #2980b9; }
        .btn-web:hover { background-color: #3498db; }
        /* 右側內容區 */
        #main-content { flex: 1; position: relative; height: 100%; background-color: #ffffff; }
        /* 圖片檢視器 (此結構保留，以便與既有控制邏輯完全相容) */
        #image-viewer { display: none; flex-direction: column; width: 100%; height: 100%; background-color: #555; }
        .viewer-toolbar {
            background-color: #1a1a1a; padding: 10px; display: flex;
            justify-content: center; align-items: center; gap: 15px; color: white;
        }
        .toolbar-btn {
            background-color: #e67e22; color: white; border: none; padding: 8px 20px;
            border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .toolbar-btn:disabled { background-color: #777; cursor: not-allowed; }
        .img-container { flex: 1; overflow-y: auto; display: flex; justify-content: center; padding: 20px; }
        .img-container img { max-width: 90%; height: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); background-color: white; }
        /* 提示卡片 */
        .display-card {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 40px; text-align: center; background-color: #ffffff;
        }
        .jump-link {
            display: inline-block; background-color: #e67e22; color: white; text-decoration: none;
            padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1 class="sidebar-title">國小五英文家教工作台</h1>
